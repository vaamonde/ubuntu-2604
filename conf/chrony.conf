# Versão: 0.01
# Testado e homologado para a versão do Ubuntu Server 26.04.x LTS x64
# Testado e homologado para a versão do Chrony v4.8.x
#
# Bloco inicial das configurações dos Servidores de NTP do NTP.br
#
###############################################################################
# Fontes NTP obtidas via DHCP
###############################################################################
# Utiliza servidores NTP fornecidos pelo DHCP.
sourcedir /run/chrony-dhcp
#
###############################################################################
# Fontes adicionais
###############################################################################
# Carrega arquivos *.sources deste diretório.
sourcedir /etc/chrony/sources.d
#
###############################################################################
# Segurança
###############################################################################
# Exige autenticação NTS das fontes selecionadas.
authselectmode require
#
# Utiliza no mínimo duas fontes confiáveis.
minsources 2
#
# Descarta fontes com distância excessiva.
maxdistance 1.0
#
# Não registra consultas de clientes.
noclientlog
#
###############################################################################
# Arquivos de funcionamento
###############################################################################
# Chaves NTP clássicas.
keyfile /etc/chrony/chrony.keys
#
# Compensação do relógio.
driftfile /var/lib/chrony/chrony.drift
#
# Armazena cookies e chaves NTS.
ntsdumpdir /var/lib/chrony
#
# Salva estatísticas ao encerrar.
dumponexit
#
# Diretório das estatísticas.
dumpdir /var/lib/chrony
#
###############################################################################
# Logs
###############################################################################
# Habilite somente para troubleshooting.
#log tracking measurements statistics
#
# Diretório dos logs.
logdir /var/log/chrony
#
###############################################################################
# Precisão
###############################################################################
# Limita estimativas ruins.
maxupdateskew 100.0
#
###############################################################################
# Relógio de hardware
###############################################################################
# Sincroniza o RTC com o relógio do sistema.
rtcsync
#
###############################################################################
# Ajuste inicial
###############################################################################
# Ajusta imediatamente diferenças >1s nas 3 primeiras sincronizações.
makestep 1 3
#
###############################################################################
# Leap Seconds
###############################################################################
# Lista oficial de Leap Seconds.
leapseclist /usr/share/zoneinfo/leap-seconds.list
#
###############################################################################
# Configurações adicionais
###############################################################################
# Inclui arquivos *.conf.
confdir /etc/chrony/conf.d
#